background {
    monitor =
    path = ~/Downloads/wallpapers/astronaut.jpg
    color = rgba(26, 27, 38, 1.0)   # Tokyo Night bg fallback (#1a1b26)

    blur_passes = 1
    blur_size = 1
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    # Tokyo Night accents:
    # outer: blue -> purple gradient
    outer_color = rgba(122, 162, 247, 0.93) rgba(187, 154, 247, 0.93) 45deg

    # check: green -> orange
    check_color = rgba(158, 206, 106, 0.93) rgba(255, 158, 100, 0.93) 120deg

    # fail: red/pink -> purple (keeps it “Tokyo” instead of neon random)
    fail_color = rgba(247, 118, 142, 0.93) rgba(187, 154, 247, 0.93) 40deg

    font_color = rgba(192, 202, 245, 0.92) # Tokyo Night fg (#c0caf5)
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}
